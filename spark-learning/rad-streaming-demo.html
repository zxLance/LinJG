<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Spark RAD Streaming Demo</title>
  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #cafefe;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
      outline: none;
    }

    .hud {
      position: fixed;
      left: 14px;
      bottom: 14px;
      max-width: min(520px, calc(100vw - 28px));
      color: white;
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.8);
      pointer-events: none;
    }

    .hud h1 {
      margin: 0 0 6px;
      font-size: 20px;
      font-weight: 650;
    }

    .hud p {
      margin: 0;
      font-size: 13px;
      line-height: 1.45;
    }
  </style>
</head>
<body>
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/",
        "@sparkjsdev/spark": "https://cdn.jsdelivr.net/npm/@sparkjsdev/spark@2.1.0/dist/spark.module.js"
      }
    }
  </script>

  <canvas id="canvas" tabindex="0"></canvas>
  <div class="hud">
    <h1>Coit Tower RAD streaming</h1>
    <p id="status">Starting Spark...</p>
  </div>

  <script type="module">
    import * as THREE from "three";
    import { SparkRenderer, SplatMesh, SparkControls } from "@sparkjsdev/spark";

    const status = document.getElementById("status");
    const radUrl = "https://storage.googleapis.com/forge-dev-public/asundqui/rad/260217/coit-40m-sh1-lod.rad";

    const originalFetch = window.fetch.bind(window);
    window.fetch = async (input, init) => {
      const request = input instanceof Request ? input : new Request(input, init);
      const range = request.headers.get("Range");
      if (String(request.url).includes(".rad")) {
        console.log("[RAD fetch]", range ?? "full file", request.url);
      }
      return originalFetch(input, init);
    };

    const scene = new THREE.Scene();
    scene.background = new THREE.Color("#cafefe");

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.01, 1000);
    camera.position.set(-0.858, 2.203, -1.128);
    camera.quaternion.set(-0.043, -0.909, -0.097, 0.402).normalize();

    const canvas = document.getElementById("canvas");
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: false });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);

    const spark = new SparkRenderer({
      renderer,
      pagedExtSplats: true,
      coneFov0: 70,
      coneFov: 120,
      behindFoveate: 0.2,
      coneFoveate: 0.4,
      lodSplatScale: 1.25
    });
    scene.add(spark);

    const world = new SplatMesh({ url: radUrl, paged: true });
    world.quaternion.set(1, 0, 0, 0).normalize();
    world.scale.setScalar(10);
    scene.add(world);

    world.initialized.then(() => {
      status.textContent = "RAD metadata initialized. Move with WASD, drag to look. Watch DevTools for Range requests.";
      console.log("[RAD meta]", world.paged?.radMetaPromise);
    }).catch((error) => {
      status.textContent = `Failed to initialize: ${error.message}`;
      console.error(error);
    });

    const controls = new SparkControls({ canvas });

    function resize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    window.addEventListener("resize", resize);
    canvas.focus();

    renderer.setAnimationLoop(() => {
      controls.update(camera);
      renderer.render(scene, camera);
    });
  </script>
</body>
</html>
